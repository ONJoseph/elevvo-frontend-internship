<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Premium Bootstrap Sidebar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="d-flex" id="wrapper">

  <!-- Sidebar -->
  <div id="sidebar-wrapper" class="bg-dark border-end">

    <div class="sidebar-heading text-center py-4 text-white fs-5 fw-bold">
      <span class="logo-text">Elevvo UI</span>
    </div>

    <div class="list-group list-group-flush my-3">

      <a href="#" class="list-group-item list-group-item-action bg-dark text-white active">
        <i class="bi bi-speedometer2 me-3"></i>
        <span class="menu-text">Dashboard</span>
      </a>

      <a href="#" class="list-group-item list-group-item-action bg-dark text-white">
        <i class="bi bi-person me-3"></i>
        <span class="menu-text">Users</span>
      </a>

      <a href="#" class="list-group-item list-group-item-action bg-dark text-white">
        <i class="bi bi-bar-chart me-3"></i>
        <span class="menu-text">Analytics</span>
      </a>

      <a href="#" class="list-group-item list-group-item-action bg-dark text-white">
        <i class="bi bi-gear me-3"></i>
        <span class="menu-text">Settings</span>
      </a>

    </div>
  </div>

  <!-- Page Content -->
  <div id="page-content-wrapper" class="w-100">

    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom px-3">
      <button class="btn btn-dark" id="menu-toggle">
        <i class="bi bi-list"></i>
      </button>
    </nav>

    <div class="container-fluid p-4">
      <h1 class="mt-4">Premium Sidebar Component</h1>
      <p>This sidebar is reusable for future dashboard projects.</p>
    </div>

  </div>
</div>

<script src="./js/script.js"></script>
</body>
</html>
