<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container py-5">

<h1 class="text-center mb-4">Task Manager</h1>

<div class="card p-4 shadow-sm">

<div class="input-group mb-3">

<input 
type="text" 
id="taskInput" 
class="form-control" 
placeholder="Add new task">

<div class="mt-3">
<button class="btn btn-outline-secondary btn-sm" onclick="filterTasks('all')">All</button>
<button class="btn btn-outline-success btn-sm" onclick="filterTasks('completed')">Completed</button>
<button class="btn btn-outline-warning btn-sm" onclick="filterTasks('active')">Active</button>
</div>

<button class="btn btn-primary" id="addTask">
Add
</button>

</div>

<ul id="taskList" class="list-group"></ul>

</div>

</div>

<script src="js/script.js"></script>

</body>
</html>
